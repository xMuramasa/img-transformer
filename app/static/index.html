<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>img-transformer</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --panel-2: #232732;
    --text: #e6e8ee;
    --muted: #8a90a0;
    --accent: #4f8cff;
    --accent-hover: #6aa0ff;
    --border: #2c313d;
    --ok: #4ade80;
    --err: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  main {
    max-width: 760px;
    margin: 32px auto;
    padding: 0 24px;
  }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 16px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .drop {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .drop.dragover { border-color: var(--accent); background: var(--panel-2); color: var(--text); }
  .drop input[type=file] { display: none; }
  .files {
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input[type=number], select {
    width: 100%;
    padding: 8px 10px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
  }
  .actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }
  button.primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  button.primary:hover { background: var(--accent-hover); }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  .status { font-size: 13px; color: var(--muted); }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }
  .report {
    margin-top: 16px;
    padding: 12px;
    background: var(--panel-2);
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    display: none;
  }
  .report.visible { display: block; }
  .report strong { color: var(--text); }
  .opt-result {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    display: none;
  }
  .opt-result.visible { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; }
  .opt-result .row { display: contents; }
  .opt-result .lbl { color: var(--muted); }
  .opt-result .val { color: var(--text); font-weight: 500; }
  .opt-result .reduction { color: var(--ok); font-weight: 600; }
</style>
</head>
<body>
<header>
  <h1>img-transformer</h1>
  <p>Convert and resize images locally, or optimize for PDF embedding.</p>
</header>
<main>
  <div class="tabs">
    <button class="tab active" data-mode="image">Single image</button>
    <button class="tab" data-mode="files">Multiple files</button>
    <button class="tab" data-mode="zip">Zip archive</button>
    <button class="tab" data-mode="pdf">PDF optimize</button>
  </div>

  <div class="panel">
    <div class="drop" id="drop">
      <div id="drop-label">Drop a file here or click to choose</div>
      <input type="file" id="file-input" />
      <div class="files" id="files"></div>
    </div>

    <div id="convert-options">
      <div class="options">
        <div>
          <label for="format">Target format</label>
          <select id="format">
            <option value="webp" selected>WebP</option>
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="gif">GIF</option>
            <option value="bmp">BMP</option>
            <option value="tiff">TIFF</option>
          </select>
        </div>
        <div>
          <label for="width">Width (px, optional)</label>
          <input type="number" id="width" min="1" placeholder="auto" />
        </div>
        <div>
          <label for="height">Height (px, optional)</label>
          <input type="number" id="height" min="1" placeholder="auto" />
        </div>
      </div>
      <div style="margin-top: 12px; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="remove-bg" />
        <label for="remove-bg" style="margin: 0; color: var(--text); font-size: 13px; cursor: pointer;">
          Remove background <span style="color: var(--muted);">(slower; forces alpha-capable format)</span>
        </label>
      </div>
    </div>

    <div id="pdf-options" style="display:none">
      <div class="options">
        <div>
          <label for="pdf-max-width">Max width (px)</label>
          <input type="number" id="pdf-max-width" min="1" max="20000" value="1400" />
        </div>
        <div>
          <label for="pdf-jpeg-quality">JPEG quality (30–95)</label>
          <input type="number" id="pdf-jpeg-quality" min="30" max="95" value="68" />
        </div>
        <div>
          <label for="pdf-png-colors">PNG palette colors (2–256)</label>
          <input type="number" id="pdf-png-colors" min="2" max="256" value="64" />
        </div>
      </div>
      <div style="margin-top: 12px; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="pdf-grayscale" />
        <label for="pdf-grayscale" style="margin: 0; color: var(--text); font-size: 13px; cursor: pointer;">
          Grayscale <span style="color: var(--muted);">(for scans, receipts, monochrome documents)</span>
        </label>
      </div>
      <p style="margin: 10px 0 0; font-size: 12px; color: var(--muted); line-height: 1.5;">
        Auto-selects JPEG or PNG per image content. Strips metadata, corrects orientation,
        and resizes to fit max width. Output is always <code style="color:var(--text)">.jpg</code>
        or <code style="color:var(--text)">.png</code>.
      </p>
    </div>

    <div class="actions">
      <button class="primary" id="submit" disabled>Convert</button>
      <span class="status" id="status"></span>
    </div>

    <div class="report" id="report"></div>
    <div class="opt-result" id="opt-result"></div>
  </div>
</main>

<script>
(() => {
  const state = { mode: "image", files: [] };
  const tabs = document.querySelectorAll(".tab");
  const drop = document.getElementById("drop");
  const dropLabel = document.getElementById("drop-label");
  const input = document.getElementById("file-input");
  const filesEl = document.getElementById("files");
  const submit = document.getElementById("submit");
  const statusEl = document.getElementById("status");
  const reportEl = document.getElementById("report");
  const optResultEl = document.getElementById("opt-result");
  const convertOpts = document.getElementById("convert-options");
  const pdfOpts = document.getElementById("pdf-options");

  function modeConfig(mode) {
    if (mode === "image") return { multiple: false, accept: "image/*", url: "/api/convert/image", filePart: "file", label: "Drop an image here or click to choose" };
    if (mode === "files") return { multiple: true,  accept: "image/*", url: "/api/convert/files", filePart: "files", label: "Drop one or more images, or click to choose" };
    if (mode === "pdf")   return { multiple: true, accept: "image/*", url: "/api/optimize/pdf/files", filePart: "files", label: "Drop one or more images to optimize for PDF embedding" };
    return { multiple: false, accept: ".zip,application/zip", url: "/api/convert/zip", filePart: "file", label: "Drop a .zip here or click to choose" };
  }

  function render() {
    const cfg = modeConfig(state.mode);
    input.multiple = cfg.multiple;
    input.accept = cfg.accept;
    dropLabel.textContent = cfg.label;
    filesEl.textContent = state.files.length
      ? state.files.map(f => `${f.name} (${(f.size/1024).toFixed(1)} KB)`).join(", ")
      : "";
    submit.disabled = state.files.length === 0;
    submit.textContent = state.mode === "pdf" ? "Optimize for PDF" : "Convert";
    const isPdf = state.mode === "pdf";
    convertOpts.style.display = isPdf ? "none" : "";
    pdfOpts.style.display    = isPdf ? "" : "none";
  }

  tabs.forEach(t => t.addEventListener("click", () => {
    tabs.forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    state.mode = t.dataset.mode;
    state.files = [];
    statusEl.textContent = "";
    statusEl.className = "status";
    reportEl.classList.remove("visible");
    optResultEl.classList.remove("visible");
    render();
  }));

  drop.addEventListener("click", () => input.click());
  drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("dragover"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("dragover"));
  drop.addEventListener("drop", e => {
    e.preventDefault();
    drop.classList.remove("dragover");
    const cfg = modeConfig(state.mode);
    const dropped = Array.from(e.dataTransfer.files);
    state.files = cfg.multiple ? dropped : dropped.slice(0, 1);
    render();
  });
  input.addEventListener("change", () => {
    const cfg = modeConfig(state.mode);
    const selected = Array.from(input.files);
    state.files = cfg.multiple ? selected : selected.slice(0, 1);
    render();
  });

  function pdfRequestConfig() {
    const isSingle = state.mode === "pdf" && state.files.length === 1;
    return {
      url: isSingle ? "/api/optimize/pdf" : "/api/optimize/pdf/files",
      filePart: isSingle ? "file" : "files",
      fallback: isSingle ? "optimized" : "optimized-for-pdf.zip",
    };
  }

  // Force alpha-capable format when bg removal is on; disable JPEG/BMP options.
  const removeBg = document.getElementById("remove-bg");
  const formatSel = document.getElementById("format");
  const ALPHA_OK = new Set(["webp", "png", "gif", "tiff"]);
  removeBg.addEventListener("change", () => {
    const on = removeBg.checked;
    for (const opt of formatSel.options) {
      opt.disabled = on && !ALPHA_OK.has(opt.value);
    }
    if (on && !ALPHA_OK.has(formatSel.value)) formatSel.value = "png";
  });

  function downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  }

  function filenameFromHeaders(headers, fallback) {
    const cd = headers.get("content-disposition") || "";
    const m = cd.match(/filename="?([^"]+)"?/i);
    return m ? m[1] : fallback;
  }

  function showReport(headers) {
    const raw = headers.get("X-Conversion-Report");
    if (!raw) return;
    try {
      const r = JSON.parse(raw);
      reportEl.innerHTML =
        `<strong>Converted:</strong> ${r.converted.length} &nbsp; ` +
        `<strong>Skipped:</strong> ${r.skipped.length} &nbsp; ` +
        `<strong>Failed:</strong> ${r.failed.length}` +
        (r.failed.length ? "<br>" + r.failed.map(f => `· ${f.name}: ${f.error}`).join("<br>") : "");
      reportEl.classList.add("visible");
    } catch { /* ignore */ }
  }

  function showOptResult(headers) {
    const raw = headers.get("X-Optimization-Result");
    if (!raw) return;
    try {
      const r = JSON.parse(raw);
      const kb = n => (n / 1024).toFixed(1) + " KB";
      const pct = r.reduction_percentage.toFixed(1);
      const dim = d => `${d[0]} × ${d[1]}`;
      const ms = r.processing_duration_ms.toFixed(0);
      optResultEl.innerHTML =
        `<span class="lbl">Format selected</span><span class="val">${r.selected_output_format.toUpperCase()}</span>` +
        `<span class="lbl">Original size</span><span class="val">${kb(r.original_size)}</span>` +
        `<span class="lbl">Optimized size</span><span class="val">${kb(r.optimized_size)}</span>` +
        `<span class="lbl">Reduction</span><span class="val reduction">−${pct}%</span>` +
        `<span class="lbl">Original dimensions</span><span class="val">${dim(r.original_dimensions)}</span>` +
        `<span class="lbl">Final dimensions</span><span class="val">${dim(r.final_dimensions)}</span>` +
        `<span class="lbl">Processing time</span><span class="val">${ms} ms</span>`;
      optResultEl.classList.add("visible");
    } catch { /* ignore */ }
  }

  submit.addEventListener("click", async () => {
    const cfg = modeConfig(state.mode);
    if (state.files.length === 0) return;

    const activeCfg = state.mode === "pdf" ? { ...cfg, ...pdfRequestConfig() } : cfg;
    const fd = new FormData();
    if (activeCfg.multiple) {
      for (const f of state.files) fd.append(activeCfg.filePart, f);
    } else {
      fd.append(activeCfg.filePart, state.files[0]);
    }
    if (state.mode === "pdf") {
      fd.append("max_width",     document.getElementById("pdf-max-width").value     || "1400");
      fd.append("jpeg_quality",  document.getElementById("pdf-jpeg-quality").value  || "68");
      fd.append("png_colors",    document.getElementById("pdf-png-colors").value    || "64");
      fd.append("grayscale",     document.getElementById("pdf-grayscale").checked ? "true" : "false");
    } else {
      fd.append("target_format", document.getElementById("format").value);
      const w = document.getElementById("width").value;
      const h = document.getElementById("height").value;
      if (w) fd.append("width", w);
      if (h) fd.append("height", h);
      if (document.getElementById("remove-bg").checked) fd.append("remove_bg", "true");
    }

    submit.disabled = true;
    statusEl.className = "status";
    statusEl.textContent = state.mode === "pdf" ? "Optimizing…" : "Converting…";
    reportEl.classList.remove("visible");
    optResultEl.classList.remove("visible");

    try {
      const res = await fetch(activeCfg.url, { method: "POST", body: fd });
      if (!res.ok) {
        let msg = `${res.status} ${res.statusText}`;
        try { const j = await res.json(); if (j.detail) msg = j.detail; } catch {}
        throw new Error(msg);
      }
      const blob = await res.blob();
      const fallback = state.mode === "image"
        ? "converted"
        : state.mode === "pdf"
          ? activeCfg.fallback
          : "converted.zip";
      downloadBlob(blob, filenameFromHeaders(res.headers, fallback));
      statusEl.className = "status ok";
      statusEl.textContent = "Done.";
      showReport(res.headers);
      showOptResult(res.headers);
    } catch (e) {
      statusEl.className = "status err";
      statusEl.textContent = `Error: ${e.message}`;
    } finally {
      submit.disabled = state.files.length === 0;
    }
  });

  render();
})();
</script>
</body>
</html>
